name: Metabase PRs Chain Creation

on:
  workflow_dispatch:
    inputs:
      metabase_version:
        description: 'Example: 0.54.10'
        required: true

permissions:
  contents: write
  pull-requests: write
  checks: write
  statuses: write

jobs:
  create-prs:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install translate-shell
        run: |
          sudo apt-get update
          sudo apt-get install -y translate-shell

      - name: Configure for Git
        run: |
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git config --global user.name 'github-actions[bot]'

      - name: Set up variables
        run: |
          VERSION="${{ inputs.metabase_version }}"
          STG_BRANCH="chore/metabase-${VERSION}-stg"
          PRD_BRANCH="chore/metabase-${VERSION}"
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          SPEC_BACK_BRANCH="metabase-spec-back-${TIMESTAMP}"

          {
            echo "version=$VERSION"
            echo "stg_branch=$STG_BRANCH"
            echo "prd_branch=$PRD_BRANCH"
            echo "spec_back_branch=$SPEC_BACK_BRANCH"
          } >> "$GITHUB_ENV"

      - name: Generate translated changelog
        run: |
          RELEASE_NOTES=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/metabase/metabase/releases/tags/v${version}" \
            --jq .body)

          TRANSLATED=$(echo "${RELEASE_NOTES}" | trans -b en:ja)

          {
            echo "## 概要"
            echo "https://github.com/metabase/metabase/releases/tag/v${version}"
            echo ""
            echo "## Changelog"
            echo "${TRANSLATED}"
          } > /tmp/changelog_body.md

      - name: Create Branch-A (STG) and PR
        uses: ./.github/actions/create-metabase-pr
        with:
          version: ${{ env.version }}
          branch_name: ${{ env.stg_branch }}
          base_branch: main
          file_path: envs/stg/locals.tf
          enable_bi: 'true'
          pr_title: "Metabaseのversionをv${{ env.version }}にアップデート(${{ env.stg_branch }})"
          pr_body_file: /tmp/changelog_body.md
          assignee: ${{ github.actor }}

      - name: Create Branch-B (PRD) and PR
        uses: ./.github/actions/create-metabase-pr
        with:
          version: ${{ env.version }}
          branch_name: ${{ env.prd_branch }}
          base_branch: ${{ env.stg_branch }}
          file_path: envs/prd/locals.tf
          enable_bi: 'false'
          pr_title: "Metabaseのversionをv${{ env.version }}にアップデート(${{ env.prd_branch }})"
          pr_body_file: /tmp/changelog_body.md
          assignee: ${{ github.actor }}

      - name: Create Branch-C (Spec Back) and PR
        run: |
          git switch -c "$spec_back_branch"

          sed -i 's/bi_version_up_mode = true/bi_version_up_mode = false/' envs/stg/locals.tf envs/prd/locals.tf
          sed -i "s/enable_bi = 1/enable_bi = 0/" envs/stg/locals.tf

          git add envs/stg/locals.tf envs/prd/locals.tf
          git commit -m "(stg prd)本番環境にて動作確認が終了したため、スペックを元に戻す"
          git push origin "$spec_back_branch"

          printf '## 概要\n\n## 本番環境で確認したこと\n\n本番環境を問題なく閲覧できるか\n\nECSタスクが問題なく起動しているか\n' > /tmp/spec_back_body.md

          gh pr create \
            --draft \
            --base "$prd_branch" \
            --head "$spec_back_branch" \
            --title "(stg prd)本番環境にて動作確認が終了したため、スペックを元に戻す" \
            --body-file /tmp/spec_back_body.md \
            --assignee "${{ github.actor }}"
